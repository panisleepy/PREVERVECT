<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <title>PREVERVECT</title>
    <style>
      body {
        margin: 0;
        padding: 12px;
        width: 280px;
        font-family: Arial, sans-serif;
        background: #111827;
        color: #e5e7eb;
      }
      h3 {
        margin: 0 0 8px;
        font-size: 15px;
      }
      p {
        margin: 6px 0;
        font-size: 12px;

      }

        background: #1f2937;

  <body>
    <h3>PREVERVECT 偵測外掛</h3>
    <p>已啟用後，會自動偵測頁面中的影片並以 1 FPS 傳送影格。</p>
